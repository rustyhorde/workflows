on:
  workflow_call:
  
name: 📌 Formatting 📌

jobs:
  rustfmt:
    name: 📌 Formatting 📌
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout ✅
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ⭕ Rustfmt Check ⭕
        run: cargo fmt --all -- --check