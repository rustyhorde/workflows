on:
  workflow_call:
  
name: 📌 Formatting 📌

jobs:
  rustfmt:
    name: 📌 Formatting 📌
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout ✅
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: ⭕ Rustfmt Check ⭕
        run: cargo fmt --all -- --check